{% extends 'parent.html' %}

{% block title %} Trainees List {% endblock %}

{% block content %}
<div class="flex justify-between items-center mb-6">
    <h2 class="text-3xl font-extrabold text-gray-800 tracking-tight">Trainees Directory</h2>
    <a href="{% url 'trainee-add' %}" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg shadow-md transition duration-300 ease-in-out transform hover:-translate-y-1">
        + Add New Trainee
    </a>
</div>

<div class="overflow-x-auto bg-white rounded-xl shadow-md border border-gray-100">
    <table class="min-w-full leading-normal">
        <thead>
            <tr class="bg-gray-800 text-white text-left text-sm uppercase tracking-wider">
                <th class="px-5 py-4 font-bold"># ID</th>
                <th class="px-5 py-4 font-bold">Full Name</th>
                <th class="px-5 py-4 font-bold text-center">Actions</th>
            </tr>
        </thead>
        <tbody class="text-gray-700">
            {% for t in trainees %}
            <tr class="border-b border-gray-200 hover:bg-gray-50 transition-colors">
                <td class="px-5 py-4 text-sm font-medium">{{ t.id }}</td>
                <td class="px-5 py-4 text-sm">{{ t.name }}</td>
                <td class="px-5 py-4 text-sm text-center space-x-2">
                    <a href="{% url 'trainee-detail' t.id %}" class="inline-block bg-cyan-500 hover:bg-cyan-600 text-white px-3 py-1 rounded-md text-xs font-bold transition">View</a>
                    <a href="{% url 'trainee-update' t.id %}" class="inline-block bg-amber-500 hover:bg-amber-600 text-white px-3 py-1 rounded-md text-xs font-bold transition">Edit</a>
                    <a href="{% url 'trainee-delete' t.id %}" class="inline-block bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-md text-xs font-bold transition">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="px-5 py-10 text-center text-gray-400 italic">
                    No trainees found in the database.
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
