{% extends 'parent.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-20 bg-white p-10 rounded-3xl shadow-2xl border-t-8 border-red-600">
    <h2 class="text-2xl font-bold text-gray-900 mb-4">confirm delete</h2>
    <p class="text-gray-600 mb-8">
    Are you sure you want to delete <span class="font-bold text-red-600">"{{ object.name }}"</span>? This action cannot be undone.
    </p>
    <form method="post" class="flex items-center justify-between">
        {% csrf_token %}
        <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold px-6 py-2 rounded-lg transition shadow-lg">
          yes, delete it
        </button>
        <a href="{% url 'trainee-list' %}" class="text-gray-500 hover:underline font-medium">cancel </a>
    </form>
</div>
{% endblock %}
