{% extends 'parent.html' %}

{% block title %} Update Trainee {% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden mt-10 border-t-4 border-amber-500">
    <div class="p-8 text-center">
        <h2 class="text-2xl font-extrabold text-gray-800 mb-6">Update Trainee Info</h2>
        <form method="POST" class="space-y-6 text-left">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Update Name</label>
                {{ form.name }}
                {% if form.name.errors %}
                    <p class="text-red-500 text-xs mt-1">{{ form.name.errors.0 }}</p>
                {% endif %}
            </div>
            <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 rounded-lg shadow-lg transition">
                Update Data
            </button>
            <a href="{% url 'trainee-list' %}" class="block text-center text-gray-400 hover:text-gray-600 font-medium">Back to List</a>
        </form>
    </div>
</div>
{% endblock %}
