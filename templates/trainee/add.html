{% extends 'parent.html' %}

{% block title %} Add New Trainee {% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden border border-gray-100 mt-10">
    <div class="bg-gray-800 py-4 px-6">
        <h3 class="text-xl font-bold text-white text-center">Add New Trainee</h3>
    </div>
    <div class="p-8">
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Full Name</label>
                <div class="relative">
                    {{ form.name }}
                </div>
                {% if form.name.errors %}
                    <p class="text-red-500 text-xs mt-2 font-semibold">{{ form.name.errors.0 }}</p>
                {% endif %}
            </div>

            <div class="flex flex-col space-y-3">
                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-lg transition duration-300">
                    Save Trainee
                </button>
                <a href="{% url 'trainee-list' %}" class="w-full text-center text-gray-500 hover:text-gray-700 font-medium py-2 transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
